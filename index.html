    <style>
        /* Custom scrollbar for better appearance in dark mode */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #09090b; 
        }
        ::-webkit-scrollbar-thumb {
            background: #27272a; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #f97316; /* Laranja no hover da barra */
        }
        .table-container {
            max-height: calc(100vh - 200px);
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-300 font-sans antialiased p-4 md:p-8 selection:bg-orange-500/30 selection:text-orange-200">

    <div class="max-w-7xl mx-auto space-y-6">
        <!-- Header Section -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 bg-zinc-900 p-6 rounded-2xl shadow-xl border border-zinc-800 relative overflow-hidden">
            <!-- Linha decorativa laranja no topo -->
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-orange-600 via-orange-400 to-orange-600"></div>

            <div class="relative z-10">
                <h1 class="text-2xl font-bold text-white tracking-tight">Lista de Clientes Ativos</h1>
                <p class="text-sm text-zinc-400 mt-1">Gere e pesquise os clientes G30, Lions Car Club e Carchat</p>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto relative z-10">
                <div class="relative w-full md:w-80">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                        <svg class="w-4 h-4 text-orange-500" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 20">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 19-4-4m0-7A7 7 0 1 1 1 8a7 7 0 0 1 14 0Z"/>
                        </svg>
                    </div>
                    <input type="text" id="searchInput" class="bg-zinc-950 border border-zinc-800 text-white text-sm rounded-lg focus:ring-orange-500 focus:border-orange-500 block w-full pl-10 p-2.5 transition-colors shadow-inner placeholder-zinc-600" placeholder="Pesquisar loja, proprietário, CNPJ..." onkeyup="filterTable()">
                </div>
                <div class="flex items-center justify-center bg-orange-500/10 text-orange-500 text-sm font-semibold px-4 py-2 rounded-lg border border-orange-500/20 whitespace-nowrap shadow-sm">
                    <span id="countDisplay">A carregar...</span>
                </div>
            </div>
        </div>

        <!-- Table Section -->
        <div class="bg-zinc-900 rounded-2xl shadow-xl border border-zinc-800 overflow-hidden">
            <div class="overflow-x-auto table-container">
                <table id="clientsTable" class="w-full text-sm text-left text-zinc-400">
                    <thead class="text-xs text-zinc-400 uppercase tracking-wider bg-zinc-950/80 backdrop-blur-sm sticky top-0 shadow-sm border-b border-zinc-800 z-10">
                        <tr>
                            <th scope="col" class="px-6 py-4 font-semibold whitespace-nowrap">Programa</th>
                            <th scope="col" class="px-6 py-4 font-semibold whitespace-nowrap">Proprietário</th>
                            <th scope="col" class="px-6 py-4 font-semibold whitespace-nowrap">Nome da Loja</th>
                            <th scope="col" class="px-6 py-4 font-semibold whitespace-nowrap">CNPJ</th>
                            <th scope="col" class="px-6 py-4 font-semibold whitespace-nowrap">ID CRM</th>
                            <th scope="col" class="px-6 py-4 font-semibold whitespace-nowrap text-center">Instagram</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-zinc-800/50">
                        <!-- Os dados serão injetados aqui -->
                    </tbody>
                </table>
            </div>
            
            <!-- Empty State -->
            <div id="emptyState" class="hidden flex-col items-center justify-center py-16 px-4 text-center">
                <div class="bg-zinc-800/50 p-4 rounded-full mb-4 border border-zinc-700/50">
                    <svg class="w-10 h-10 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                <h3 class="text-lg font-medium text-white">Nenhum cliente encontrado</h3>
                <p class="text-sm text-zinc-500 mt-1">Tente utilizar outros termos de pesquisa.</p>
            </div>
        </div>
    </div>

    <script>
        function csvToArray(text) {
            let p = '', row = [''], ret = [row], i = 0, r = 0, s = !0, l;
            for (l of text) {
                if ('"' === l) {
                    if (s && l === p) row[i] += l;
                    s = !s;
                } else if (',' === l && s) l = row[++i] = '';
                else if ('\n' === l && s) {
                    if ('\r' === p) row[i] = row[i].slice(0, -1);
                    row = ret[++r] = [l = '']; i = 0;
                } else row[i] += l;
                p = l;
            }
            return ret.filter(r => r.length > 1 || r[0].trim() !== '');
        }

        function formatInstagramLink(link1, link2) {
            let finalLink = link1 ? link1.trim() : (link2 ? link2.trim() : '');
            
            if (!finalLink || finalLink === '.' || finalLink === 'd' || finalLink === 'g' || finalLink === 'sad') {
                return '<span class="text-zinc-500 italic font-medium">Não informado</span>';
            }
            
            finalLink = finalLink.replace(/https:\/\/www\.instagram\.com\/\//g, 'https://www.instagram.com/');

            if (!finalLink.startsWith('http')) {
                let username = finalLink.startsWith('@') ? finalLink.substring(1) : finalLink;
                if(username.indexOf('http') > -1) {
                    finalLink = username.split('http')[1];
                    finalLink = 'http' + finalLink;
                } else {
                    finalLink = `https://www.instagram.com/${username}`;
                }
            }

            return `
                <a href="${finalLink}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1.5 text-orange-500 hover:text-orange-400 bg-orange-500/10 hover:bg-orange-500/20 border border-orange-500/20 px-4 py-1.5 rounded-full text-xs font-semibold uppercase tracking-wider transition-all duration-200 ease-in-out">
                    <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path fill-rule="evenodd" d="M12.315 2c2.43 0 2.784.013 3.808.06 1.064.049 1.791.218 2.427.465a4.902 4.902 0 011.772 1.153 4.902 4.902 0 011.153 1.772c.247.636.416 1.363.465 2.427.048 1.067.06 1.407.06 4.123v.08c0 2.643-.012 2.987-.06 4.043-.049 1.064-.218 1.791-.465 2.427a4.902 4.902 0 01-1.153 1.772 4.902 4.902 0 01-1.772 1.153c-.636.247-1.363.416-2.427.465-1.067.048-1.407.06-4.123.06h-.08c-2.643 0-2.987-.012-4.043-.06-1.064-.049-1.791-.218-2.427-.465a4.902 4.902 0 01-1.772-1.153 4.902 4.902 0 01-1.153-1.772c-.247-.636-.416-1.363-.465-2.427-.047-1.024-.06-1.379-.06-3.808v-.63c0-2.43.013-2.784.06-3.808.049-1.064.218-1.791.465-2.427a4.902 4.902 0 011.153-1.772A4.902 4.902 0 015.45 2.525c.636-.247 1.363-.416 2.427-.465C8.901 2.013 9.256 2 11.685 2h.63zm-.081 1.802h-.468c-2.456 0-2.784.011-3.807.058-.975.045-1.504.207-1.857.344-.467.182-.8.398-1.15.748-.35.35-.566.683-.748 1.15-.137.353-.3.882-.344 1.857-.047 1.023-.058 1.351-.058 3.807v.468c0 2.456.011 2.784.058 3.807.045.975.207 1.504.344 1.857.182.466.399.8.748 1.15.35.35.683.566 1.15.748.353.137.882.3 1.857.344 1.054.048 1.37.058 4.041.058h.08c2.597 0 2.917-.01 3.96-.058.976-.045 1.505-.207 1.858-.344.466-.182.8-.398 1.15-.748.35-.35.566-.683.748-1.15.137-.353.3-.882.344-1.857.048-1.055.058-1.37.058-4.041v-.08c0-2.597-.01-2.917-.058-3.96-.045-.976-.207-1.505-.344-1.858a3.097 3.097 0 00-.748-1.15 3.098 3.098 0 00-1.15-.748c-.353-.137-.882-.3-1.857-.344-1.023-.047-1.351-.058-3.807-.058zM12 6.865a5.135 5.135 0 110 10.27 5.135 5.135 0 010-10.27zm0 1.802a3.333 3.333 0 100 6.666 3.333 3.333 0 000-6.666zm5.338-3.205a1.2 1.2 0 110 2.4 1.2 1.2 0 010-2.4z" clip-rule="evenodd" /></svg>
                    Aceder
                </a>`;
        }

        function formatBadge(texto) {
            if (texto.toLowerCase().includes('lions')) {
                return `<span class="bg-amber-500/10 text-amber-500 text-[10px] uppercase tracking-wider font-bold px-2.5 py-1 rounded border border-amber-500/20 shadow-sm">${texto}</span>`;
            }
            if (texto.toLowerCase().includes('carchat')) {
                return `<span class="bg-blue-500/10 text-blue-400 text-[10px] uppercase tracking-wider font-bold px-2.5 py-1 rounded border border-blue-500/20 shadow-sm">${texto}</span>`;
            }
            return `<span class="bg-zinc-800 text-zinc-300 text-[10px] uppercase tracking-wider font-bold px-2.5 py-1 rounded border border-zinc-700 shadow-sm">${texto}</span>`;
        }

        function formatCrmLink(id) {
            if (!id || id === '-' || id.trim() === '') {
                return '<span class="text-zinc-600">-</span>';
            }
            const cleanId = id.trim();
            const url = `https://gwebcarconsultoriaemarketingautomotivo.pipedrive.com/deal/${cleanId}`;
            return `
                <a href="${url}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1 text-orange-500 hover:text-orange-400 hover:underline transition-colors" title="Abrir no Pipedrive">
                    #${cleanId}
                    <svg class="w-3 h-3 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                </a>
            `;
        }

        // Formatador inteligente de CNPJ
        function formatCnpjMask(cnpj) {
            if (!cnpj || cnpj === '-' || cnpj.trim() === '') {
                return '<span class="text-zinc-600">-</span>';
            }
            
            const digits = cnpj.replace(/\D/g, '');
            
            if (digits.length === 14) {
                const masked = digits.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, "$1.$2.$3/$4-$5");
                return `<span class="font-mono text-xs tracking-wider text-zinc-300">${masked}</span>`;
            } else if (digits.length > 0 && digits.length !== 14) {
                return `<span class="font-mono text-xs tracking-wider text-red-400 font-bold bg-red-500/10 px-2 py-0.5 rounded border border-red-500/20" title="CNPJ Incompleto/Inválido: Possui ${digits.length} dígitos em vez de 14.">${cnpj} ⚠️</span>`;
            } else {
                return `<span class="text-xs font-semibold text-red-400 bg-red-500/10 px-2 py-0.5 rounded border border-red-500/20" title="Valor não é um CNPJ válido">${cnpj} ⚠️</span>`;
            }
        }

        function initTable() {
            const rawCsv = document.getElementById('csvData').textContent;
            const cleanedCsv = rawCsv.replace(/\\s*/g, '');
            const parsedRows = csvToArray(cleanedCsv);
            
            const rows = parsedRows.slice(1);
            const tbody = document.getElementById('tableBody');
            
            rows.forEach(row => {
                if(row.length >= 6 && row[0].trim() !== '') {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-zinc-800 transition-colors group cursor-default";
                    
                    const programa = row[0];
                    const proprietario = row[1];
                    const loja = row[2];
                    const cnpj = row[4] || '-';
                    const id = row[5] || '-';
                    const instaLoja = row[6] || '';
                    const instaPessoa = row[7] || '';

                    tr.innerHTML = `
                        <td class="px-6 py-4">${formatBadge(programa)}</td>
                        <td class="px-6 py-4 font-semibold text-white group-hover:text-orange-500 transition-colors">${proprietario}</td>
                        <td class="px-6 py-4 text-zinc-300 font-medium">${loja}</td>
                        <td class="px-6 py-4">${formatCnpjMask(cnpj)}</td>
                        <td class="px-6 py-4">${formatCrmLink(id)}</td>
                        <td class="px-6 py-4 text-center">${formatInstagramLink(instaLoja, instaPessoa)}</td>
                    `;
                    tbody.appendChild(tr);
                }
            });

            updateCount();
        }

        function filterTable() {
            const input = document.getElementById("searchInput");
            const filter = input.value.toLowerCase();
            const table = document.getElementById("clientsTable");
            const tr = table.getElementsByTagName("tr");
            let count = 0;

            for (let i = 1; i < tr.length; i++) {
                let rowText = tr[i].textContent || tr[i].innerText;
                if (rowText.toLowerCase().indexOf(filter) > -1) {
                    tr[i].style.display = "";
                    count++;
                } else {
                    tr[i].style.display = "none";
                }
            }
            
            document.getElementById('countDisplay').innerText = `A mostrar ${count} clientes`;
            
            const emptyState = document.getElementById('emptyState');
            if (count === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                table.classList.add('hidden');
            } else {
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');
                table.classList.remove('hidden');
            }
        }

        function updateCount() {
            const tr = document.querySelectorAll("#tableBody tr");
            document.getElementById('countDisplay').innerText = `Total: ${tr.length} clientes`;
        }

        document.addEventListener('DOMContentLoaded', initTable);
    </script>
